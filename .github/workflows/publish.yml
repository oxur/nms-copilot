name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish nms-core
        run: cargo publish -p nms-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for index update
        run: sleep 30
      - name: Publish nms-save
        run: cargo publish -p nms-save --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for index update
        run: sleep 30
      - name: Publish nms-compat
        run: cargo publish -p nms-compat --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for index update
        run: sleep 30
      - name: Publish nms-graph
        run: cargo publish -p nms-graph --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for index update
        run: sleep 30
      - name: Publish nms-query
        run: cargo publish -p nms-query --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for index update
        run: sleep 30
      - name: Publish nms-watch
        run: cargo publish -p nms-watch --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for index update
        run: sleep 30
      - name: Publish nms-cache
        run: cargo publish -p nms-cache --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for index update
        run: sleep 30
      - name: Publish nms-cli
        run: cargo publish -p nms-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for index update
        run: sleep 30
      - name: Publish nms-copilot
        run: cargo publish -p nms-copilot --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for index update
        run: sleep 30
      - name: Publish nms (meta-crate)
        run: cargo publish -p nms --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
